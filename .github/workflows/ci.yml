name: CI

on:
  push:
    branches: [main, develop, 'release/**', 'hotfix/**']
  pull_request:
    branches: [main, develop, 'release/**']

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - run: cd frontend && npx tsc --noEmit
      - run: cd frontend && npm run lint || true

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: |
      github.ref == 'refs/heads/develop' ||
      github.ref == 'refs/heads/main' ||
      startsWith(github.ref, 'refs/heads/release/') ||
      github.base_ref == 'develop' ||
      github.base_ref == 'main'
    env:
      CI: true
      NODE_ENV: test
      MINIMAX_BASE_URL: http://localhost:8999
      MINIMAX_API_KEY: test-key-ci
      PORT: 3000
      TURSO_DATABASE_URL: file:./database/music-studio.sqlite
      TURSO_AUTH_TOKEN: ''
      CLERK_PUBLISHABLE_KEY: pk_test_placeholder
      STORAGE_DRIVER: local
      STORAGE_PATH: /tmp/redinside-storage
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: cd backend && npm ci
      - run: sudo apt-get update && sudo apt-get install -y ffmpeg redis-server
      - run: redis-server --daemonize yes && redis-cli ping
      - name: Start mock server
        run: |
          cd backend
          node tests/minimax-mock-server.js > /tmp/mock-server.log 2>&1 &
          echo "Mock PID: $!"
          sleep 2
          cat /tmp/mock-server.log
      - run: npx wait-on http://localhost:8999/health --timeout 15000 || { cat /tmp/mock-server.log; exit 1; }
      - name: Run DB migrations
        run: cd backend && node src/database/migrate.js
      - name: Start backend
        run: |
          cd backend
          node src/server.js > /tmp/backend.log 2>&1 &
          echo "Backend PID: $!"
          sleep 5
          cat /tmp/backend.log
      - run: npx wait-on http://localhost:3000/health --timeout 30000 || { cat /tmp/backend.log; exit 1; }
      - run: cd backend && npm test

  frontend-tests:
    name: Frontend E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: |
      github.ref == 'refs/heads/develop' ||
      github.ref == 'refs/heads/main' ||
      startsWith(github.ref, 'refs/heads/release/') ||
      github.base_ref == 'develop' ||
      github.base_ref == 'main'
    env:
      CI: true
      NODE_ENV: test
      MINIMAX_BASE_URL: http://localhost:8999
      MINIMAX_API_KEY: test-key-ci
      PORT: 3000
      VITE_API_BASE_URL: http://localhost:3000
      TURSO_DATABASE_URL: file:./database/music-studio.sqlite
      TURSO_AUTH_TOKEN: ''
      CLERK_PUBLISHABLE_KEY: pk_test_placeholder
      STORAGE_DRIVER: local
      STORAGE_PATH: /tmp/redinside-storage
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: sudo apt-get update && sudo apt-get install -y ffmpeg redis-server
      - run: redis-server --daemonize yes
      - run: cd backend && npm ci
      - run: cd frontend && npm ci
      - run: cd frontend && npx playwright install --with-deps chromium
      - run: cd frontend && npm run build
      - name: Run DB migrations
        run: cd backend && node src/database/migrate.js
      - name: Start mock and backend
        run: |
          node backend/tests/minimax-mock-server.js > /tmp/mock-server.log 2>&1 &
          sleep 2
          cd backend && node src/server.js > /tmp/backend.log 2>&1 &
          sleep 5
          echo "=== MOCK LOG ===" && cat /tmp/mock-server.log
          echo "=== BACKEND LOG ===" && cat /tmp/backend.log
          npx wait-on http://localhost:3000/health --timeout 30000 || { cat /tmp/backend.log; exit 1; }
      - run: cd frontend && npx playwright test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
