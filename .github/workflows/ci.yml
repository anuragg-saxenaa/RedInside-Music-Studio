name: CI

on:
  push:
    branches: [main, develop, 'release/**', 'hotfix/**']
  pull_request:
    branches: [main, develop, 'release/**']

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - run: cd frontend && npx tsc --noEmit
      - run: cd frontend && npm run lint || true  # lint not configured yet

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Only run on develop, release/*, main — not feature/*
    if: |
      github.ref == 'refs/heads/develop' ||
      github.ref == 'refs/heads/main' ||
      startsWith(github.ref, 'refs/heads/release/') ||
      github.base_ref == 'develop' ||
      github.base_ref == 'main'
    env:
      CI: true
      NODE_ENV: test
      MINIMAX_BASE_URL: http://localhost:8999
      MINIMAX_API_KEY: test-key-ci
      PORT: 3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: cd backend && npm ci
      - run: sudo apt-get update && sudo apt-get install -y ffmpeg redis-server
      - run: redis-server --daemonize yes && redis-cli ping
      - run: node backend/tests/minimax-mock-server.js &
      - run: npx wait-on http://localhost:8999/health --timeout 10000 || true
      - run: cd backend && node src/server.js &
      - run: npx wait-on http://localhost:3000/health --timeout 15000
      - run: cd backend && npm test

  frontend-tests:
    name: Frontend E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Only on develop/main/release branches
    if: |
      github.ref == 'refs/heads/develop' ||
      github.ref == 'refs/heads/main' ||
      startsWith(github.ref, 'refs/heads/release/') ||
      github.base_ref == 'develop' ||
      github.base_ref == 'main'
    env:
      CI: true
      NODE_ENV: test
      MINIMAX_BASE_URL: http://localhost:8999
      MINIMAX_API_KEY: test-key-ci
      PORT: 3000
      VITE_API_BASE_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: sudo apt-get update && sudo apt-get install -y ffmpeg redis-server
      - run: redis-server --daemonize yes
      - run: cd backend && npm ci
      - run: cd frontend && npm ci
      - run: cd frontend && npx playwright install --with-deps chromium
      - run: cd frontend && npm run build
      - run: |
          node backend/tests/minimax-mock-server.js &
          cd backend && node src/server.js &
          npx wait-on http://localhost:3000/health --timeout 15000
      - run: cd frontend && npx playwright test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
