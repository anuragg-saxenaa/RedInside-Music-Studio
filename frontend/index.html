<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#08020a" />
    <title>RedInside Music Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;500&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      html, body { height: 100%; max-width: 100%; overflow-x: hidden; }
      body { background-color: #08020a; overscroll-behavior: none; position: relative; }
      #root { height: 100%; max-width: 100%; overflow-x: hidden; }
      /* Mobile: hide scrollbars, improve touch scrolling */
      @media (max-width: 768px) {
        ::-webkit-scrollbar { display: none; }
        * { -webkit-overflow-scrolling: touch; }
        input[type="range"] { -webkit-appearance: none; height: 4px; border-radius: 2px; background: rgba(255,255,255,0.15); }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #fff; cursor: pointer; }
      }
      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: #141414; }
      ::-webkit-scrollbar-thumb { background: #2A2A2A; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #3A3A3A; }
      ::selection { background: #E63946; color: #FFFFFF; }

      @keyframes rds-pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50%       { opacity: 0.4; transform: scale(0.6); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Boot splash — visible instantly (before JS loads / auth resolves /
           cold-start wake). React replaces this on mount. -->
      <div style="position:fixed;inset:0;background:#050103;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;font-family:-apple-system,'Outfit','DM Sans',sans-serif">
        <div style="width:104px;height:104px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#1b0508,#080103 65%);box-shadow:0 0 60px rgba(230,57,70,.25),inset 0 1px 0 rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;gap:7px">
          <span style="width:9px;border-radius:5px;height:26px;background:linear-gradient(180deg,#ff6b76,#E63946 55%,#8f1220);box-shadow:0 0 14px rgba(230,57,70,.85);animation:rds-eq 1.15s ease-in-out 0s infinite"></span>
          <span style="width:9px;border-radius:5px;height:46px;background:linear-gradient(180deg,#ff6b76,#E63946 55%,#8f1220);box-shadow:0 0 14px rgba(230,57,70,.85);animation:rds-eq 1.15s ease-in-out .18s infinite"></span>
          <span style="width:9px;border-radius:5px;height:34px;background:linear-gradient(180deg,#ff6b76,#E63946 55%,#8f1220);box-shadow:0 0 14px rgba(230,57,70,.85);animation:rds-eq 1.15s ease-in-out .36s infinite"></span>
          <span style="width:9px;border-radius:5px;height:52px;background:linear-gradient(180deg,#ff6b76,#E63946 55%,#8f1220);box-shadow:0 0 14px rgba(230,57,70,.85);animation:rds-eq 1.15s ease-in-out .09s infinite"></span>
          <span style="width:9px;border-radius:5px;height:22px;background:linear-gradient(180deg,#ff6b76,#E63946 55%,#8f1220);box-shadow:0 0 14px rgba(230,57,70,.85);animation:rds-eq 1.15s ease-in-out .27s infinite"></span>
        </div>
        <div style="font-size:20px;font-weight:800;letter-spacing:-.02em;color:#fff">RedInside <span style="color:#E63946">Music Studio</span></div>
        <div style="font-size:12px;color:rgba(255,255,255,.35)">Warming up the studio…</div>
      </div>
      <style>@keyframes rds-eq{0%,100%{transform:scaleY(1)}50%{transform:scaleY(.45)}}</style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
