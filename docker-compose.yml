version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - MINIMAX_BASE_URL=${MINIMAX_BASE_URL:-https://api.minimax.io}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DATABASE_PATH=/app/database/music-studio.sqlite
      - STORAGE_PATH=/app/storage
    volumes:
      - ./storage:/app/storage
      - ./database:/app/database
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis_data: